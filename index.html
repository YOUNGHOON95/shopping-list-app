<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.7rem;
      color: #2d3748;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus { border-color: #4299e1; }

    .input-row input[type="number"] {
      width: 70px;
      padding: 10px 8px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }

    .input-row input[type="number"]:focus { border-color: #4299e1; }

    .btn-add {
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #3182ce; }
    .btn-add:disabled { background: #a0aec0; cursor: not-allowed; }

    .category-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #cbd5e0;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #4a5568;
      transition: all 0.15s;
    }

    .tab.active {
      background: #4299e1;
      border-color: #4299e1;
      color: #fff;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      transition: opacity 0.2s;
    }

    .item.done { opacity: 0.5; }

    .item.done .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4299e1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-size: 0.97rem;
      color: #2d3748;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 2px;
    }

    .badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: #ebf8ff;
      color: #2b6cb0;
      white-space: nowrap;
    }

    .btn-del {
      background: none;
      border: none;
      color: #fc8181;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-del:hover { background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }

    .btn-clear {
      background: none;
      border: 1.5px solid #fc8181;
      color: #fc8181;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear:hover { background: #fff5f5; }

    .select-cat {
      padding: 10px 10px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      color: #4a5568;
      background: #fff;
      cursor: pointer;
    }

    .select-cat:focus { border-color: #4299e1; }

    .status-bar {
      font-size: 0.78rem;
      color: #a0aec0;
      text-align: center;
      margin-top: 12px;
    }

    .status-bar.error { color: #fc8181; }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="summary" id="summary">로딩 중...</p>

  <div class="input-row">
    <input type="text" id="itemInput" placeholder="상품명 입력" maxlength="40" />
    <input type="number" id="qtyInput" value="1" min="1" max="99" />
    <select class="select-cat" id="catSelect">
      <option value="식품">식품</option>
      <option value="음료">음료</option>
      <option value="생활용품">생활용품</option>
      <option value="기타">기타</option>
    </select>
    <button class="btn-add" id="addBtn" onclick="addItem()">추가</button>
  </div>

  <div class="category-tabs" id="tabs"></div>
  <ul class="list" id="list"></ul>

  <div class="actions">
    <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    <button class="btn-clear" style="border-color:#a0aec0;color:#a0aec0" onclick="clearAll()">전체 삭제</button>
  </div>
  <p class="status-bar" id="statusBar">Supabase 연결 중...</p>
</div>

<script>
  const SUPABASE_URL = 'https://hupelmutcyzdyfojgube.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1cGVsbXV0Y3l6ZHlmb2pndWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjU4NDQsImV4cCI6MjA5NTA0MTg0NH0.JiJV06MX_0djZvLzpsR96Mx4xl7RNxfUJjQmhxjKGhs';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CATEGORIES = ['전체', '식품', '음료', '생활용품', '기타'];
  let items = [];
  let activeTab = '전체';

  function setStatus(msg, isError = false) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar' + (isError ? ' error' : '');
  }

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: true });

    if (error) {
      setStatus('데이터 로드 실패: ' + error.message, true);
      return;
    }
    items = data;
    setStatus('Supabase 연결됨');
    render();
  }

  async function addItem() {
    const name = document.getElementById('itemInput').value.trim();
    const qty = parseInt(document.getElementById('qtyInput').value) || 1;
    const cat = document.getElementById('catSelect').value;
    if (!name) { document.getElementById('itemInput').focus(); return; }

    const btn = document.getElementById('addBtn');
    btn.disabled = true;

    const { data, error } = await db
      .from('shopping_items')
      .insert([{ name, qty, cat, done: false }])
      .select()
      .single();

    btn.disabled = false;

    if (error) { setStatus('추가 실패: ' + error.message, true); return; }

    items.push(data);
    document.getElementById('itemInput').value = '';
    document.getElementById('qtyInput').value = '1';
    setStatus('항목이 추가됩니다');
    render();
    document.getElementById('itemInput').focus();
  }

  async function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    const { error } = await db
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);

    if (error) { setStatus('업데이트 실패: ' + error.message, true); return; }

    item.done = !item.done;
    render();
  }

  async function deleteItem(id) {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);

    if (error) { setStatus('삭제 실패: ' + error.message, true); return; }

    items = items.filter(i => i.id !== id);
    setStatus('항목이 삭제됩니다');
    render();
  }

  async function clearDone() {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;

    const { error } = await db
      .from('shopping_items')
      .delete()
      .in('id', doneIds);

    if (error) { setStatus('삭제 실패: ' + error.message, true); return; }

    items = items.filter(i => !i.done);
    setStatus('완료 항목이 삭제됩니다');
    render();
  }

  async function clearAll() {
    if (items.length === 0) return;
    if (!confirm('전체 항목을 삭제할까요?')) return;

    const { error } = await db
      .from('shopping_items')
      .delete()
      .neq('id', 0);

    if (error) { setStatus('삭제 실패: ' + error.message, true); return; }

    items = [];
    setStatus('전체 항목이 삭제됩니다');
    render();
  }

  function setTab(tab) {
    activeTab = tab;
    render();
  }

  function render() {
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = CATEGORIES.map(c =>
      `<button class="tab${activeTab === c ? ' active' : ''}" onclick="setTab('${c}')">${c}</button>`
    ).join('');

    const filtered = activeTab === '전체' ? items : items.filter(i => i.cat === activeTab);
    const listEl = document.getElementById('list');

    if (filtered.length === 0) {
      listEl.innerHTML = `<li class="empty">항목이 없습니다</li>`;
    } else {
      listEl.innerHTML = filtered.map(item => `
        <li class="item${item.done ? ' done' : ''}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDone(${item.id})" />
          <div class="item-info">
            <div class="item-name">${escHtml(item.name)}</div>
            <div class="item-meta">${escHtml(item.cat)}</div>
          </div>
          <span class="badge">× ${item.qty}</span>
          <button class="btn-del" onclick="deleteItem(${item.id})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    const total = items.length;
    const done = items.filter(i => i.done).length;
    document.getElementById('summary').textContent = `총 ${total}개 · 완료 ${done}개`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  loadItems();
</script>
</body>
</html>
